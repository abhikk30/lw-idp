# Jenkins chart values for the dev kind profile.
# Dev profile uses HTTP only — TLS via cert-manager + mkcert lands in P1.9.

controller:
  # Resource sizing: kind has limited memory; cap container resources.
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1500m
      memory: 1500Mi

  # Pin Jenkins LTS — the chart-default 2.479.2 is older than the latest
  # plugins on the update center, which fail to install with "requires a
  # greater version of Jenkins (2.479.3)". Bumping to a newer LTS keeps
  # `installLatestPlugins: true` working without manual plugin pins.
  image:
    registry: docker.io
    repository: jenkins/jenkins
    # JDK 21. Jenkins UI warns "Java 17 end of life in Jenkins" on jdk17 with
    # support ending Mar 31 2026; jdk21 is the supported runtime.
    tag: "2.504.3-jdk21"

  # Service exposed via Ingress; chart's built-in ingress block.
  serviceType: ClusterIP
  servicePort: 8080
  targetPort: 8080
  agentListenerPort: 50000

  # The Jenkins URL Jenkins thinks it's reachable at — used for build URLs,
  # OIDC redirect, etc. Must match the ingress hostname.
  jenkinsUrl: "http://jenkins.lw-idp.local"

  # Plugins required for OIDC + Configuration as Code. No version pins —
  # let the chart's plugin manager pick versions compatible with the
  # chart-default Jenkins image.
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
    - oic-auth
    - matrix-auth
    - job-dsl
  installLatestPlugins: true
  installLatestSpecifiedPlugins: true

  # JCasC (Configuration as Code) is what wires Dex SSO. The chart appends
  # this YAML to /var/jenkins_home/casc_configs and the casc plugin loads it
  # at startup.
  JCasC:
    defaultConfig: false
    configScripts:
      jenkins-config: |
        jenkins:
          systemMessage: "lw-idp Jenkins — Configured via JCasC. Login via Dex SSO."
          numExecutors: 0  # controller runs no jobs; agents (kubernetes plugin) do
          mode: EXCLUSIVE
          authorizationStrategy:
            globalMatrix:
              # Dex-authenticated users get full read+build privileges in dev.
              # P1.9 will tighten with team-scoped per-folder permissions.
              permissions:
                - "Overall/Administer:authenticated"
        unclassified:
          location:
            url: "http://jenkins.lw-idp.local/"
            adminAddress: "lw-idp-admin@example.com"
      kubernetes-cloud: |
        # Registers the Kubernetes cloud + a default JNLP agent pod template.
        # Required because we set JCasC.defaultConfig: false (so the chart
        # doesn't auto-emit its default JCasC, which would clobber our
        # securityRealm/authorizationStrategy above). Per-build pod templates
        # (kaniko, alpine/git, …) are declared inline in each Jenkinsfile;
        # this block only registers the cloud and the default JNLP template.
        jenkins:
          clouds:
            - kubernetes:
                name: "kubernetes"
                serverUrl: "https://kubernetes.default"
                namespace: "jenkins"
                jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
                jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
                containerCapStr: "10"
                maxRequestsPerHostStr: "32"
                connectTimeout: "5"
                readTimeout: "15"
                retentionTimeout: "5"
                waitForPodSec: "600"
                podLabels:
                  - key: "jenkins/jenkins-jenkins-agent"
                    value: "true"
                templates:
                  - name: "default"
                    namespace: "jenkins"
                    label: "jenkins-jenkins-agent"
                    nodeUsageMode: "NORMAL"
                    serviceAccount: "default"
                    podRetention: Never
                    yamlMergeStrategy: override
                    inheritYamlMergeStrategy: false
                    showRawYaml: true
                    slaveConnectTimeoutStr: "100"
                    containers:
                      - name: "jnlp"
                        image: "jenkins/inbound-agent:3273.v4cfe589b_fd83-1"
                        args: "^${computer.jnlpmac} ^${computer.name}"
                        workingDir: /home/jenkins/agent
                        ttyEnabled: false
                        privileged: false
                        resourceRequestCpu: 250m
                        resourceRequestMemory: 256Mi
                        resourceLimitCpu: 1000m
                        resourceLimitMemory: 1Gi
      oidc-config: |
        jenkins:
          securityRealm:
            oic:
              clientId: "jenkins"
              clientSecret: "${OIDC_CLIENT_SECRET}"
              # Newer oic-auth plugin (4.5xx+) requires the OIDC endpoints
              # to be nested under `serverConfiguration.wellKnown` rather
              # than at the top level. `scopesOverride` replaces the old
              # `scopes` field.
              serverConfiguration:
                wellKnown:
                  wellKnownOpenIDConfigurationUrl: "http://dex.lw-idp.local/.well-known/openid-configuration"
                  scopesOverride: "openid profile email groups"
              userNameField: "email"
              fullNameFieldName: "name"
              emailFieldName: "email"
              groupsFieldName: "groups"
              # Case-sensitive identity matching. Default for new oic-auth
              # configs; setting explicitly silences the security advisory
              # banner on the Jenkins UI ("OIDC realm was configured before
              # the introduction of case-sensitivity options"). Two
              # different-cased emails are treated as different users —
              # safer than the legacy case-insensitive behavior which could
              # merge identities.
              userIdStrategy: "caseSensitive"
              groupIdStrategy: "caseSensitive"
              # http://jenkins.lw-idp.local/securityRealm/finishLogin is the
              # default callback — must match the Dex staticClient redirectURI.
              logoutFromOpenidProvider: false
              postLogoutRedirectUrl: "http://jenkins.lw-idp.local/"

  # Mount the Dex client secret as an env var; JCasC interpolates it via
  # ${OIDC_CLIENT_SECRET}. Sourced from the `jenkins-dex` Secret created by
  # cluster-bootstrap.sh.
  containerEnv:
    - name: OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: jenkins-dex
          key: clientSecret
    # Service-account API token, generated by cluster-bootstrap.sh and
    # written to both `jenkins-svc-token` (this Secret) AND
    # `gateway-svc-jenkins-api` in the lw-idp namespace. The init.groovy
    # script below seeds Jenkins's user database with a matching API token
    # so the gateway can Basic-auth as `lw-idp-gateway-svc`. `optional: true`
    # so Jenkins boots cleanly on first install before bootstrap creates the
    # Secret — init.groovy returns early when the env var is empty.
    - name: JENKINS_SVC_TOKEN
      valueFrom:
        secretKeyRef:
          name: jenkins-svc-token
          key: JENKINS_SVC_TOKEN
          optional: true

  # Init scripts run after JCasC. Files placed under
  # /var/jenkins_home/init.groovy.d/ — Jenkins runs them at startup.
  initScripts:
    # P2.1.1.1: replace the manual runbook step with a Groovy init script
    # that creates the `lw-idp-gateway-svc` user and seeds an API token
    # whose plaintext matches what the gateway has. Token plaintext lives
    # in `jenkins-svc-token` + `gateway-svc-jenkins-api` Secrets (same
    # value); init.groovy stores the SHA-256 hash of the plaintext in the
    # user's apiToken store. Basic auth from the gateway then succeeds.
    lw-idp-svc-token: |-
      import jenkins.model.Jenkins
      import hudson.model.User
      import jenkins.security.ApiTokenProperty

      String token = System.getenv("JENKINS_SVC_TOKEN")
      if (!token || token.isEmpty()) {
        println("[lw-idp init] JENKINS_SVC_TOKEN not set — skipping API token seed.")
        return
      }

      // Jenkins API token format: 2-char version prefix ("11") + 32 random
      // hex chars = 34 chars total. addFixedNewToken takes the PLAINTEXT
      // (despite the misleading param name `tokenSha256Hex`) and hashes
      // internally. Bootstrap generates the token in this exact shape.
      if (token.length() != 34) {
        println("[lw-idp init] expected 34-char token (2 version + 32 hex); got " +
                token.length() + " chars — skipping. Check bootstrap script.")
        return
      }

      String username = "lw-idp-gateway-svc"
      String tokenName = "lw-idp-gateway"

      User user = User.getById(username, true)
      ApiTokenProperty prop = user.getProperty(ApiTokenProperty.class)
      if (prop == null) {
        prop = new ApiTokenProperty()
        user.addProperty(prop)
      }

      // Idempotent: revoke any prior token with our marker name, then seed.
      def store = prop.tokenStore
      def existing = store.tokenListSortedByName.findAll { it.name == tokenName }
      existing.each { store.revokeToken(it.uuid) }
      store.addFixedNewToken(tokenName, token)
      user.save()

      println("[lw-idp init] seeded API token '${tokenName}' for user '${username}'")

  # Built-in admin password — disabled because Dex is the SSO. The chart
  # still creates `jenkins-admin-password` Secret; we let it generate one
  # but don't expose it (admin UI shouldn't be reached via password in dev
  # since OIDC is the only login).
  adminPassword: ""

  ingress:
    enabled: true
    apiVersion: networking.k8s.io/v1
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      # Jenkins emits long-running streaming responses (build logs, console
      # output); disable buffering so they reach the browser promptly.
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
    hostName: jenkins.lw-idp.local
    paths: []
    tls: []  # TLS lands in P1.9

# Persistent storage for /var/jenkins_home (jobs, plugins, secrets).
persistence:
  enabled: true
  storageClass: standard  # kind's default StorageClass
  accessMode: ReadWriteOnce
  size: 8Gi

# Agents are dynamic Kubernetes pods spun up per build. Enabled in P2.1.2 so
# kaniko/git pod templates declared inline in each Jenkinsfile can be scheduled.
agent:
  enabled: true
  podName: jenkins-agent
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }
  # Kaniko/git pod templates are declared inline in each Jenkinsfile;
  # no static templates needed in the chart.
