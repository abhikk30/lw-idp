apiVersion: v1
kind: Namespace
metadata:
  name: lwidp-data
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
  namespace: lwidp-data
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised
  storage:
    size: 2Gi
    storageClass: standard
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
  monitoring:
    enablePodMonitor: false
