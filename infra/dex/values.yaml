replicaCount: 2

config:
  # Dev profile uses plain HTTP. P1.9 introduces TLS via cert-manager + mkcert.
  issuer: http://dex.lw-idp.local
  storage:
    type: kubernetes
    config:
      inCluster: true
  web:
    http: 0.0.0.0:5556
  connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        redirectURI: http://dex.lw-idp.local/callback
  oauth2:
    responseTypes: ["code"]
    skipApprovalScreen: true
  staticClients:
    - id: lw-idp-gateway
      name: lw-idp Gateway
      redirectURIs: ["http://portal.lw-idp.local/auth/callback"]
      # Dex 2.41 does NOT env-var-substitute staticClients[].secret (the GitHub
      # connector does its own runtime env lookup, so $GITHUB_* works there).
      # The value here MUST match `gateway-svc-dex.DEX_CLIENT_SECRET` in the
      # lw-idp namespace. Rotated to a SealedSecret in P1.9.
      secret: devnotreal

envFrom:
  - secretRef:
      name: dex-env

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: dex.lw-idp.local
      paths:
        - path: /
          pathType: Prefix
