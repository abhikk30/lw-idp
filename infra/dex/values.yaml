replicaCount: 2

config:
  # Dev profile uses plain HTTP. P1.9 introduces TLS via cert-manager + mkcert.
  issuer: http://dex.lw-idp.local
  storage:
    type: kubernetes
    config:
      inCluster: true
  web:
    http: 0.0.0.0:5556
  connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        redirectURI: http://dex.lw-idp.local/callback
  oauth2:
    responseTypes: ["code"]
    skipApprovalScreen: true
  staticClients:
    - id: lw-idp-gateway
      name: lw-idp Gateway
      redirectURIs: ["http://portal.lw-idp.local/auth/callback"]
      # Dex 2.41 does NOT env-var-substitute staticClients[].secret. Hardcoded
      # to `devnotreal`; P1.8.1 SealedSecret rotation lives in P1.9.
      secret: devnotreal
      # trustedPeers: tokens issued for this client carry `argocd` in `aud` too,
      # so the gateway can forward the user's id_token to Argo CD as a bearer
      # without token-exchange middleware (P2.0 spec §3.1 invariant 3).
      trustedPeers:
        - argocd
    - id: argocd
      name: Argo CD
      redirectURIs: ["http://argocd.lw-idp.local/auth/dex/callback"]
      # Same env-var-substitution gotcha as lw-idp-gateway above. The literal
      # MUST match the value cluster-bootstrap.sh writes to the `argocd-dex`
      # Secret in the `argocd` namespace.
      secret: devnotreal-argocd
      trustedPeers:
        - lw-idp-gateway

envFrom:
  - secretRef:
      name: dex-env

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: dex.lw-idp.local
      paths:
        - path: /
          pathType: Prefix
