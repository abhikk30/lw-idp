version: v2
plugins:
  # protoc-gen-es v2 generates messages AND GenService descriptors (for @connectrpc/connect v2).
  # protoc-gen-connect-es is not needed with protoc-gen-es v2 — services are in _pb.ts.
  - local: ./node_modules/.bin/protoc-gen-es
    out: dist/proto
    opt:
      - target=ts
      - import_extension=.js
inputs:
  - directory: proto
