openapi: 3.1.0
info:
  title: lw-idp Gateway API
  version: 0.1.0
  description: External REST surface of the lw-idp gateway-svc BFF.
servers:
  - url: /api/v1

security:
  - sessionCookie: []

tags:
  - name: auth
  - name: me
  - name: services
  - name: clusters
  - name: teams
  - name: observability

paths:
  /me:
    get:
      tags: [me]
      summary: Get current user + teams
      security:
        - sessionCookie: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /services:
    get:
      tags: [services]
      summary: List services
      security:
        - sessionCookie: []
      parameters:
        - { name: q,        in: query, required: false, schema: { type: string } }
        - { name: team,     in: query, required: false, schema: { type: string } }
        - { name: type,     in: query, required: false, schema: { $ref: "#/components/schemas/ServiceType" } }
        - { name: lifecycle, in: query, required: false, schema: { $ref: "#/components/schemas/ServiceLifecycle" } }
        - { name: limit,    in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { name: cursor,   in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServiceList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [services]
      summary: Register a service
      security:
        - sessionCookie: []
      parameters:
        - { name: Idempotency-Key, in: header, required: false, schema: { type: string, maxLength: 128 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ServiceCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Service" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /services/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [services]
      summary: Get a service
      security:
        - sessionCookie: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Service" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [services]
      summary: Update a service
      security:
        - sessionCookie: []
      parameters:
        - { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ServiceUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Service" }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      tags: [services]
      summary: Delete a service
      security:
        - sessionCookie: []
      parameters:
        - { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /clusters:
    get:
      tags: [clusters]
      summary: List clusters
      security:
        - sessionCookie: []
      parameters:
        - { name: env,      in: query, required: false, schema: { $ref: "#/components/schemas/Environment" } }
        - { name: provider, in: query, required: false, schema: { $ref: "#/components/schemas/Provider" } }
        - { name: limit,    in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { name: cursor,   in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClusterList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [clusters]
      summary: Register a cluster
      security:
        - sessionCookie: []
      parameters:
        - { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClusterCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cluster" }
        "409": { $ref: "#/components/responses/Conflict" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /clusters/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [clusters]
      summary: Get a cluster
      security:
        - sessionCookie: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cluster" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [clusters]
      summary: Update a cluster
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClusterUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cluster" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [clusters]
      summary: Deregister a cluster
      security:
        - sessionCookie: []
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /teams:
    get:
      tags: [teams]
      summary: List teams
      security:
        - sessionCookie: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamList" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /observability/logs:
    get:
      tags: [observability]
      summary: Tail recent logs for a service
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: service
          required: true
          schema: { type: string }
          description: Service slug
        - in: query
          name: since
          schema: { type: string, default: "1h" }
        - in: query
          name: limit
          schema: { type: integer, default: 200, maximum: 1000 }
        - in: query
          name: trace_id
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LogsResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /observability/traces:
    get:
      tags: [observability]
      summary: List recent traces for a service
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: service
          required: true
          schema: { type: string }
        - in: query
          name: since
          schema: { type: string, default: "1h" }
        - in: query
          name: limit
          schema: { type: integer, default: 10, maximum: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TracesResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /observability/traces/{traceId}:
    get:
      tags: [observability]
      summary: Get a single trace's spans
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: traceId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TraceDetailResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /observability/metrics:
    get:
      tags: [observability]
      summary: Sparkline data for a service metric
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: service
          required: true
          schema: { type: string }
        - in: query
          name: panel
          required: true
          schema: { type: string, enum: [req_rate, error_rate, p95_latency] }
        - in: query
          name: since
          schema: { type: string, default: "1h" }
        - in: query
          name: step
          schema: { type: string, default: "15s" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MetricsResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /observability/pods:
    get:
      tags: [observability]
      summary: List live pods for a service
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: service
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PodsResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: lw-sid

  responses:
    BadRequest:
      description: Bad request
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unauthorized:
      description: Unauthorized
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFound:
      description: Not found
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Conflict:
      description: Conflict
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    RateLimited:
      description: Too many requests
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:    { type: string, enum: [bad_request, unauthorized, forbidden, not_found, conflict, rate_limited, internal, unavailable] }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    ServiceType:
      type: string
      enum: [service, library, website, ml, job]

    ServiceLifecycle:
      type: string
      enum: [experimental, production, deprecated]

    Me:
      type: object
      required: [user, teams]
      properties:
        user:
          type: object
          required: [id, subject, email, displayName]
          properties:
            id:          { type: string, format: uuid }
            subject:     { type: string }
            email:       { type: string, format: email }
            displayName: { type: string }
            avatarUrl:   { type: string }
        teams:
          type: array
          items: { $ref: "#/components/schemas/TeamRef" }

    TeamRef:
      type: object
      required: [id, slug, name]
      properties:
        id:   { type: string, format: uuid }
        slug: { type: string, pattern: "^[a-z0-9-]+$" }
        name: { type: string }

    TeamList:
      type: object
      required: [teams]
      properties:
        teams:
          type: array
          items: { $ref: "#/components/schemas/TeamRef" }

    Service:
      type: object
      required: [id, slug, name, type, lifecycle]
      properties:
        id:          { type: string, format: uuid }
        slug:        { type: string, pattern: "^[a-z0-9-]+$" }
        name:        { type: string }
        description: { type: string }
        type:        { $ref: "#/components/schemas/ServiceType" }
        lifecycle:   { $ref: "#/components/schemas/ServiceLifecycle" }
        ownerTeamId: { type: string, format: uuid }
        repoUrl:     { type: string }
        tags:
          type: array
          items: { type: string }
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }

    ServiceCreate:
      type: object
      required: [slug, name, type]
      properties:
        slug:        { type: string, pattern: "^[a-z0-9-]+$" }
        name:        { type: string, minLength: 1 }
        description: { type: string }
        type:        { $ref: "#/components/schemas/ServiceType" }
        lifecycle:   { $ref: "#/components/schemas/ServiceLifecycle" }
        ownerTeamId: { type: string, format: uuid }
        repoUrl:     { type: string }
        tags:
          type: array
          items: { type: string }

    ServiceUpdate:
      type: object
      properties:
        name:        { type: string }
        description: { type: string }
        lifecycle:   { $ref: "#/components/schemas/ServiceLifecycle" }
        ownerTeamId: { type: string, format: uuid }
        repoUrl:     { type: string }
        tags:
          type: array
          items: { type: string }

    ServiceList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Service" }
        nextCursor: { type: string }

    Environment:
      type: string
      enum: [dev, stage, prod]

    Provider:
      type: string
      enum: [docker-desktop, eks, gke, aks, kind, other]

    Cluster:
      type: object
      required: [id, slug, name, environment, provider]
      properties:
        id:          { type: string, format: uuid }
        slug:        { type: string, pattern: "^[a-z0-9-]+$" }
        name:        { type: string }
        environment: { $ref: "#/components/schemas/Environment" }
        region:      { type: string }
        provider:    { $ref: "#/components/schemas/Provider" }
        apiEndpoint: { type: string }
        tags:
          type: array
          items: { type: string }
        createdAt:   { type: string, format: date-time }

    ClusterCreate:
      type: object
      required: [slug, name, environment, provider]
      properties:
        slug:        { type: string, pattern: "^[a-z0-9-]+$" }
        name:        { type: string, minLength: 1 }
        environment: { $ref: "#/components/schemas/Environment" }
        region:      { type: string }
        provider:    { $ref: "#/components/schemas/Provider" }
        apiEndpoint: { type: string }
        tags:
          type: array
          items: { type: string }

    ClusterUpdate:
      type: object
      properties:
        name:        { type: string }
        region:      { type: string }
        apiEndpoint: { type: string }
        tags:
          type: array
          items: { type: string }

    ClusterList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Cluster" }
        nextCursor: { type: string }

    LokiLine:
      type: object
      required: [ts, raw]
      properties:
        ts:        { type: string, format: date-time }
        raw:       { type: string }
        level:     { type: string, nullable: true }
        msg:       { type: string, nullable: true }
        trace_id:  { type: string, nullable: true }
        span_id:   { type: string, nullable: true }
        pod:       { type: string, nullable: true }

    LogsResponse:
      type: object
      required: [lines, truncated]
      properties:
        lines:     { type: array, items: { $ref: "#/components/schemas/LokiLine" } }
        truncated: { type: boolean }

    TraceSummary:
      type: object
      required: [trace_id, root_service, root_operation, started_at, duration_ms, span_count, status]
      properties:
        trace_id:        { type: string }
        root_service:    { type: string }
        root_operation:  { type: string }
        started_at:      { type: string, format: date-time }
        duration_ms:     { type: number }
        span_count:      { type: integer }
        status:          { type: string, enum: [ok, error] }

    TracesResponse:
      type: object
      required: [traces]
      properties:
        traces:    { type: array, items: { $ref: "#/components/schemas/TraceSummary" } }

    SpanNode:
      type: object
      required: [span_id, parent_id, service, name, started_at, duration_ms, status, attributes]
      properties:
        span_id:        { type: string }
        parent_id:      { type: string, nullable: true }
        service:        { type: string }
        name:           { type: string }
        started_at:     { type: string, format: date-time }
        duration_ms:    { type: number }
        status:         { type: string, enum: [ok, error] }
        attributes:
          type: object
          additionalProperties: true

    TraceDetailResponse:
      type: object
      required: [trace_id, spans]
      properties:
        trace_id: { type: string }
        spans:    { type: array, items: { $ref: "#/components/schemas/SpanNode" } }

    MetricsPoint:
      type: object
      required: [ts, value]
      properties:
        ts:    { type: string, format: date-time }
        value: { type: number }

    MetricsResponse:
      type: object
      required: [panel, unit, points]
      properties:
        panel:  { type: string }
        unit:   { type: string }
        points: { type: array, items: { $ref: "#/components/schemas/MetricsPoint" } }

    Pod:
      type: object
      required: [name, phase, ready, restart_count]
      properties:
        name:          { type: string }
        phase:         { type: string }
        ready:         { type: boolean }
        started_at:    { type: string, nullable: true }
        restart_count: { type: integer }
        node:          { type: string, nullable: true }

    PodsResponse:
      type: object
      required: [pods]
      properties:
        pods: { type: array, items: { $ref: "#/components/schemas/Pod" } }
