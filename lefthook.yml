pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,tsx,jsx,json,md}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
