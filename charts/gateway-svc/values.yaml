image:
  repository: localhost:5001/lw-idp/gateway-svc
  tag: dev
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 4000

replicaCount: 2

resources:
  requests: { cpu: 50m, memory: 128Mi }
  limits:   { cpu: 500m, memory: 512Mi }

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  maxSkew: 1
  whenUnsatisfiable: ScheduleAnyway

probes:
  liveness:
    path: /healthz
  readiness:
    path: /readyz

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
  hosts:
    - host: portal.lw-idp.local
      paths:
        - path: /api/v1/
          pathType: Prefix
        - path: /auth/
          pathType: Prefix

extraEnv:
  - name: IDENTITY_SVC_URL
    value: "http://identity-svc.lw-idp.svc.cluster.local"
  - name: CATALOG_SVC_URL
    value: "http://catalog-svc.lw-idp.svc.cluster.local"
  - name: CLUSTER_SVC_URL
    value: "http://cluster-svc.lw-idp.svc.cluster.local"
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: gateway-svc-redis
        key: REDIS_URL
  - name: DEX_ISSUER
    # Browser-reachable URL via ingress; CoreDNS rewrite makes it resolve
    # in-cluster too, so the gateway uses the same issuer for token exchange,
    # JWKS fetch, and the browser-facing redirect — keeps the `iss` claim
    # consistent.
    value: "http://dex.lw-idp.local"
  - name: DEX_AUDIENCE
    value: "lw-idp-gateway"
  - name: DEX_CLIENT_ID
    value: "lw-idp-gateway"
  - name: DEX_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: gateway-svc-dex
        key: DEX_CLIENT_SECRET
  - name: DEX_JWKS_PATH
    value: "/keys"
  - name: GATEWAY_REDIRECT_URI
    value: "http://portal.lw-idp.local/auth/callback"
  - name: SESSION_SECURE
    value: "false"
  - name: SESSION_TTL_SECONDS
    value: "28800"
  - name: RATELIMIT_MAX
    value: "600"
  - name: RATELIMIT_WINDOW_MS
    value: "60000"
  - name: IDEMPOTENCY_TTL_SECONDS
    value: "86400"
  # Argo CD proxy (P2.0). In-cluster DNS — no ingress hop, no TLS overhead.
  - name: ARGOCD_API_URL
    value: "http://argocd-server.argocd.svc:80"
  # Webhook HMAC token (used by D3 webhook receiver; mounted ahead of D3 so
  # the Secret/env wiring is in place when that plugin lands).
  - name: ARGOCD_WEBHOOK_TOKEN
    valueFrom:
      secretKeyRef:
        name: gateway-svc-argocd-webhook
        key: ARGOCD_WEBHOOK_TOKEN
  # Jenkins API (P2.1.1). Username + API token come from a Secret seeded
  # by cluster-bootstrap.sh. Empty values mean "not configured yet" —
  # the gateway returns 503 jenkins_not_configured for /api/v1/jenkins/*
  # until the user runs the one-time runbook step to populate the
  # Secret with a real Jenkins API token.
  - name: JENKINS_API_URL
    value: "http://jenkins.jenkins.svc:8080"
  - name: JENKINS_API_USERNAME
    valueFrom:
      secretKeyRef:
        name: gateway-svc-jenkins-api
        key: JENKINS_API_USERNAME
  - name: JENKINS_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: gateway-svc-jenkins-api
        key: JENKINS_API_TOKEN
  # Observability stack URLs (P2.2). In-cluster DNS for Loki/Tempo/Prometheus
  # deployed under the `observability` namespace. PROM_URL is consumed by C2
  # (metrics proxy) — defined here now to avoid churn in C2.
  - name: LOKI_URL
    value: "http://loki.observability.svc.cluster.local:3100"
  - name: TEMPO_URL
    value: "http://tempo.observability.svc.cluster.local:3200"
  - name: PROM_URL
    value: "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090"

monitoring:
  enabled: true
