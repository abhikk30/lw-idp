apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-debug-webhook-script
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lw-idp-observability.labels" . | nindent 4 }}
data:
  server.js: |
    const http = require("http");
    const server = http.createServer((req, res) => {
      let body = "";
      req.on("data", (chunk) => { body += chunk; });
      req.on("end", () => {
        console.log(JSON.stringify({
          ts: new Date().toISOString(),
          method: req.method,
          url: req.url,
          headers: req.headers,
          body: body || null,
        }));
        res.writeHead(200, { "Content-Type": "application/json" });
        res.end('{"ok":true}');
      });
    });
    server.listen(80, "0.0.0.0", () => {
      console.log(JSON.stringify({ ts: new Date().toISOString(), msg: "alert-debug-webhook listening on :80" }));
    });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-debug-webhook
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lw-idp-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: alert-debug-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: alert-debug-webhook
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: alert-debug-webhook
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: webhook
          image: node:22-alpine
          command: ["node", "/srv/server.js"]
          ports:
            - { name: http, containerPort: 80 }
          volumeMounts:
            - { name: script, mountPath: /srv }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 50m, memory: 64Mi }
      volumes:
        - name: script
          configMap:
            name: alert-debug-webhook-script
---
apiVersion: v1
kind: Service
metadata:
  name: alert-debug-webhook
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lw-idp-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: alert-debug-webhook
spec:
  selector:
    app.kubernetes.io/component: alert-debug-webhook
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - { name: http, port: 80, targetPort: http }
