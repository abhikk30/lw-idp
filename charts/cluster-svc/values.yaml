image:
  repository: localhost:5001/lw-idp/cluster-svc
  tag: dev
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 4003

replicaCount: 2

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  maxSkew: 1
  whenUnsatisfiable: ScheduleAnyway

probes:
  liveness:
    path: /healthz
  readiness:
    path: /readyz

extraEnv:
  - name: PG_DSN
    valueFrom:
      secretKeyRef:
        name: cluster-svc-pg
        key: PG_DSN
  - name: NATS_URL
    value: "nats://nats.nats-system.svc.cluster.local:4222"
  - name: RUN_MIGRATIONS
    value: "1"
  - name: OUTBOX_POLL_MS
    value: "500"
